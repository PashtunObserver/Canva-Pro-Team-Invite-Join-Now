<svg xmlns="http://www.w3.org/2000/svg" width="900" height="110" viewBox="0 0 900 110" role="img" aria-label="Canva Pro Team">
  <title>Canva Pro Team Joining Link</title>
  <defs>
    <linearGradient id="btnBg" x1="0" y1="0" x2="450" y2="0" gradientUnits="userSpaceOnUse" spreadMethod="repeat">
      <stop offset="0" stop-color="#ff5722"/>
      <stop offset="0.25" stop-color="#ff8f00"/>
      <stop offset="0.5" stop-color="#ff5722"/>
      <stop offset="0.75" stop-color="#e91e63"/>
      <stop offset="1" stop-color="#ff5722"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="-450 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe082"/>
      <stop offset="1" stop-color="#ff6f00"/>
    </linearGradient>
    <clipPath id="clip"><rect x="4" y="4" width="892" height="102" rx="18"/></clipPath>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="9"/></filter>
  </defs>

  <!-- pulsing outer glow -->
  <rect x="14" y="16" width="872" height="88" rx="20" fill="#ff5722" filter="url(#soft)" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.65;0.3" dur="2.4s" repeatCount="indefinite"/>
  </rect>

  <!-- button body -->
  <rect x="4" y="4" width="892" height="102" rx="18" fill="url(#btnBg)"/>

  <g clip-path="url(#clip)">
    <!-- glass top -->
    <rect x="4" y="4" width="892" height="52" rx="18" fill="url(#glass)"/>
    <!-- shine sweep -->
    <g transform="skewX(-20)">
      <rect x="0" y="-40" width="130" height="220" fill="#ffffff" opacity="0.22">
        <animateTransform attributeName="transform" type="translate" values="-400 0;1500 0;1500 0" keyTimes="0;0.3;1" dur="3.8s" repeatCount="indefinite"/>
      </rect>
      <rect x="0" y="-40" width="46" height="220" fill="#ffffff" opacity="0.12">
        <animateTransform attributeName="transform" type="translate" values="-460 0;1440 0;1440 0" keyTimes="0;0.3;1" dur="3.8s" repeatCount="indefinite"/>
      </rect>
    </g>
    <!-- rising bubbles -->
    <circle cx="250" cy="110" r="5" fill="#ffffff" opacity="0">
      <animate attributeName="cy" values="115;5" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.28;0" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="560" cy="110" r="3.5" fill="#ffffff" opacity="0">
      <animate attributeName="cy" values="115;5" dur="5.5s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.25;0" dur="5.5s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="110" r="4.5" fill="#ffffff" opacity="0">
      <animate attributeName="cy" values="115;5" dur="5s" begin="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.22;0" dur="5s" begin="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- borders -->
  <rect x="4" y="4" width="892" height="102" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.5"/>
  <rect x="7" y="7" width="886" height="96" rx="15" fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="2.5" stroke-dasharray="16 12">
    <animate attributeName="stroke-dashoffset" from="0" to="-112" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- rocket -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="88 56;88 48;88 56" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" dur="2.2s" repeatCount="indefinite"/>
    <g transform="rotate(-18)">
      <g transform="translate(0 14)">
        <g>
          <animateTransform attributeName="transform" type="scale" values="1 1;1.15 1.4;0.85 0.8;1.1 1.3;1 1" dur="0.7s" repeatCount="indefinite"/>
          <path d="M0 0 C 8 9 6 20 0 28 C -6 20 -8 9 0 0 Z" fill="url(#flame)"/>
        </g>
      </g>
      <path d="M -13 4 L -25 20 L -13 17 Z" fill="#c2185b"/>
      <path d="M 13 4 L 25 20 L 13 17 Z" fill="#c2185b"/>
      <path d="M 0 -32 C 11 -19 13.5 -2 13.5 14 L -13.5 14 C -13.5 -2 -11 -19 0 -32 Z" fill="#fafafa"/>
      <path d="M 0 -32 C 4 -27 7 -21 9 -14 L -9 -14 C -7 -21 -4 -27 0 -32 Z" fill="#e91e63"/>
      <circle cx="0" cy="-1" r="6" fill="#b3e5fc" stroke="#0277bd" stroke-width="2"/>
    </g>
  </g>

  <!-- label -->
  <text x="465" y="61" text-anchor="middle" font-family="Segoe UI, Roboto, Arial, sans-serif" font-size="34" font-weight="800" letter-spacing="1.5" fill="#000000" opacity="0.28">CANVA PRO TEAM LINK</text>
  <text x="465" y="58" text-anchor="middle" font-family="Segoe UI, Roboto, Arial, sans-serif" font-size="34" font-weight="800" letter-spacing="1.5" fill="#ffffff">CANVA PRO TEAM LINK</text>
  <text x="465" y="88" text-anchor="middle" font-family="Segoe UI, Roboto, Arial, sans-serif" font-size="15" font-weight="600" letter-spacing="4" fill="#ffffff" opacity="0.92">FREE • INSTANT • JOIN</text>

  <!-- pulsing arrow -->
  <g>
    <circle cx="838" cy="55" r="25" fill="#ffffff" opacity="0.22">
      <animate attributeName="opacity" values="0.16;0.35;0.16" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0;7 0;0 0" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" dur="1.2s" repeatCount="indefinite"/>
      <path d="M 830 43 L 846 55 L 830 67" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- twinkling sparkles -->
  <g fill="#ffffff">
    <path transform="translate(185 26)" d="M0 -7 L2 -2 L7 0 L2 2 L0 7 L-2 2 L-7 0 L-2 -2 Z" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <path transform="translate(330 90) scale(0.8)" d="M0 -7 L2 -2 L7 0 L2 2 L0 7 L-2 2 L-7 0 L-2 -2 Z" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="2.6s" begin="0.7s" repeatCount="indefinite"/>
    </path>
    <path transform="translate(650 24) scale(0.9)" d="M0 -7 L2 -2 L7 0 L2 2 L0 7 L-2 2 L-7 0 L-2 -2 Z" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="2.4s" begin="1.1s" repeatCount="indefinite"/>
    </path>
    <path transform="translate(752 86) scale(0.7)" d="M0 -7 L2 -2 L7 0 L2 2 L0 7 L-2 2 L-7 0 L-2 -2 Z" opacity="0">
      <animate attributeName="opacity" values="0;0.85;0" dur="2.8s" begin="1.6s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
